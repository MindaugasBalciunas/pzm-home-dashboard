<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Kiosk viewport: no pinch zoom (a wall panel should never end up
         stuck zoomed-in), edge-to-edge on notched/rounded displays. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Dark mode is enforced app-wide, so one theme colour fits all. -->
    <meta name="theme-color" content="#0f1216" />
    <!-- Fullscreen when saved to home screen / launched by a kiosk shell. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <base href="./" />
    <title>PZM Home Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
